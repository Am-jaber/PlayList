name: Build extension

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # fetch all tags so the version guard can see them

      - name: Read version from manifest
        id: manifest
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extension version: $version"

      # Fail the build if the manifest version was not bumped: a push to master
      # whose version already has a matching v<version> tag means an older,
      # already-released version is being shipped again. (Skipped on tag pushes,
      # where the tag naturally matches the version being released.)
      - name: Guard against un-bumped version
        if: startsWith(github.ref, 'refs/tags/v') == false
        run: |
          set -euo pipefail
          version="${{ steps.manifest.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            echo "::error::manifest.json version ${version} already released as tag v${version}. Bump the version before pushing to master."
            exit 1
          fi
          echo "Version ${version} has no existing v${version} tag — OK to build."

      - name: Package extension zip
        id: package
        run: |
          set -euo pipefail
          out="middle-click-add-to-queue-v${{ steps.manifest.outputs.version }}.zip"
          # Zip ONLY the files the extension needs at runtime.
          # Everything else (docs, tooling, git) is intentionally excluded.
          zip -r "$out" \
            manifest.json \
            content.js \
            injected.js \
            popup.html \
            popup.js \
            icons
          echo "artifact=$out" >> "$GITHUB_OUTPUT"
          echo "Built $out"
          unzip -l "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

      # On a version tag (e.g. git tag v1.0.0 && git push --tags),
      # also publish the zip as a GitHub Release asset.
      - name: Attach zip to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}
