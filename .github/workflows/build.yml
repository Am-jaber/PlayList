name: Build extension

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: manifest
        run: |
          version=$(node -p "require('./manifest.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extension version: $version"

      - name: Package extension zip
        run: |
          set -euo pipefail
          out="middle-click-add-to-queue-v${{ steps.manifest.outputs.version }}.zip"
          # Zip ONLY the files the extension needs at runtime.
          # Everything else (docs, tooling, git) is intentionally excluded.
          zip -r "$out" \
            manifest.json \
            content.js \
            injected.js \
            popup.html \
            popup.js \
            icons
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
          echo "Built $out"
          unzip -l "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

      # On a version tag (e.g. git tag v1.0.0 && git push --tags),
      # also publish the zip as a GitHub Release asset.
      - name: Attach zip to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
